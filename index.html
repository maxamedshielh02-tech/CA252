<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Marks Report</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:red;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.table-container{
    width:100%;
    overflow-x:auto;
}

table{
    width:100%;
    min-width:700px;
    border-collapse:collapse;
    background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

thead{
    background:#007bff;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:15px;
    text-align:center;
    transition:0.3s;
}

tbody tr:nth-child(even){
    background:#f8f8f8;
}

tbody tr:hover{
    background:#d6ecff;
}

tbody td:hover{
    background:#fff3cd;
    cursor:pointer;
}

.edit-btn{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

.edit-btn:hover{
    background:#1e7e34;
    transform:scale(1.05);
}

.delete-btn:hover{
    background:#cc0000;
    transform:scale(1.05);
}

@media (max-width:768px){

    body{
        padding:10px;
    }

    h1{
        font-size:22px;
    }

    th,td{
        padding:10px;
        font-size:14px;
    }

    .edit-btn,
    .delete-btn{
        padding:8px 12px;
        font-size:12px;
    }
}
</style>
</head>
<body>

<h1>Student Marks Report</h1>

<div class="table-container">
<table>

<thead>
<tr>
    <th>ID</th>
    <th>NAME</th>
    <th>MATH</th>
    <th>ENGLISH</th>
    <th>SCIENCE</th>
    <th colspan="2">BUTTON</th>
</tr>
</thead>

<tbody>
<tr>
    <td>C1240001</td>
    <td>Ahmed Ali</td>
    <td>85</td>
    <td>90</td>
    <td>78</td>
    <td><button class="edit-btn">Edit</button></td>
    <td><button class="delete-btn">Delete</button></td>
</tr>

<tr>
    <td>C1240002</td>
    <td>Layla Noor</td>
    <td>92</td>
    <td>88</td>
    <td>95</td>
    <td><button class="edit-btn">Edit</button></td>
    <td><button class="delete-btn">Delete</button></td>
</tr>

<tr>
    <td>C1240003</td>
    <td>Sami Yusuf</td>
    <td>76</td>
    <td>81</td>
    <td>89</td>
    <td><button class="edit-btn">Edit</button></td>
    <td><button class="delete-btn">Delete</button></td>
</tr>

<tr>
    <td>C1240043</td>
    <td>Ahmed Yusuf</td>
    <td>76</td>
    <td>81</td>
    <td>89</td>
    <td><button class="edit-btn">Edit</button></td>
    <td><button class="delete-btn">Delete</button></td>
</tr>
</tbody>

</table>
</div>

</body>
</html>
